<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Synth : Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: sans-serif; }
        #msg { 
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: #00ff00; font-size: 1.4rem; text-shadow: 0 0 10px #00ff00;
            font-weight: bold; opacity: 0; transition: opacity 0.5s; pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="msg">SÉQUENCE VALIDÉE</div>
    <script>
        const HEX_SIZE = 34; 
        const COLORS = [null, 0x00f2ff, 0xff00ff, 0x00ff00, 0xffff00, 0xff0000];
        const W_DIST = HEX_SIZE * Math.sqrt(3);
        const H_DIST = HEX_SIZE * 1.5;
        const DIRS = [{q: 1, r: 0}, {q: 0, r: 1}, {q: -1, r: 1}, {q: -1, r: 0}, {q: 0, r: -1}, {q: 1, r: -1}];

        // NIVEAU MANUEL (9 pièces au total : 4 fixes, 5 mobiles)
        const LEVEL_DATA = [
            [1, 2, 3, 4, 5, 1], // 0: Centre (Fixe)
            [1, 5, 2, 2, 4, 3], // 1: Mobile 
            [2, 3, 4, 1, 5, 2], // 2: Terminal Sud (Fixe)
            [4, 3, 2, 1, 5, 4], // 3: Mobile 
            [1, 2, 4, 3, 5, 1], // 4: Mobile 
            [1, 4, 5, 3, 4, 2], // 5: Terminal Ouest (Fixe)
            [4, 2, 5, 1, 3, 2], // 6: Mobile 
            [3, 1, 4, 1, 2, 5], // 7: Mobile 
            [2, 1, 3, 5, 2, 4]  // 8: Terminal Nord-Est (Fixe)
        ];

        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#050508',
            scene: { create: create }
        };

        const game = new Phaser.Game(config);
        let pieces = [];
        let slots = [];

        function create() {
            const cx = this.cameras.main.centerX;
            const cy = this.cameras.main.centerY - 40;

            const layout = [
                {q: 0, r: 0, f: true},    
                {q: 0, r: 1, f: false}, {q: 0, r: 2, f: true},    
                {q: -1, r: 0, f: false}, {q: -2, r: 0, f: false}, {q: -3, r: 0, f: true},   
                {q: 1, r: -1, f: false}, {q: 2, r: -2, f: false}, {q: 3, r: -3, f: true}   
            ];

            // On sépare les mobiles pour l'inventaire
            let mobileCount = 0;

            layout.forEach((pos, i) => {
                const px = cx + W_DIST * (pos.q + pos.r/2);
                const py = cy + H_DIST * pos.r;
                
                if (pos.f) {
                    const p = createPiece(this, px, py, [...LEVEL_DATA[i]], true);
                    p.q = pos.q; p.r = pos.r;
                    pieces.push(p);
                } else {
                    // Création du slot
                    const s = this.add.graphics({x: px, y: py});
                    s.lineStyle(1, 0x00f2ff, 0.2).strokePoints(getHexPts(HEX_SIZE), true);
                    slots.push({x: px, y: py, q: pos.q, r: pos.r, occupied: false});

                    // Calcul position inventaire (5 pièces réparties sur la largeur)
                    // On utilise mobileCount pour l'espacement
                    const ix = (window.innerWidth / 6) * (mobileCount + 1);
                    const iy = window.innerHeight - 80;
                    
                    let edges = [...LEVEL_DATA[i]];
                    const randRot = Math.floor(Math.random() * 6);
                    for(let r=0; r<randRot; r++) edges.unshift(edges.pop());
                    
                    const p = createPiece(this, ix, iy, edges, false);
                    pieces.push(p);
                    mobileCount++;
                }
            });
            
            this.input.on('drag', (pointer, obj, dx, dy) => {
                obj.setPosition(dx, dy);
                obj.hasMoved = true;
                if (obj.currentSlot) { obj.currentSlot.occupied = false; obj.currentSlot = null; obj.q = null; obj.r = null; }
                refresh(this);
            });

            this.input.on('dragend', (pointer, obj) => {
                let found = false;
                slots.forEach(s => {
                    if (!s.occupied && Phaser.Math.Distance.Between(obj.x, obj.y, s.x, s.y) < 30) {
                        obj.setPosition(s.x, s.y);
                        obj.q = s.q; obj.r = s.r;
                        obj.currentSlot = s;
                        s.occupied = true;
                        found = true;
                    }
                });
                refresh(this);
            });
        }

        function createPiece(scene, x, y, edges, isFixed) {
            const container = scene.add.container(x, y);
            container.setData('edges', edges);
            container.isFixed = isFixed;
            container.hasMoved = false;
            const gfx = scene.add.graphics();
            container.add(gfx);

            drawPiece(container, "normal");

            if (!isFixed) {
                container.setInteractive(new Phaser.Geom.Polygon(getHexPts(HEX_SIZE + 10)), Phaser.Geom.Polygon.Contains);
                scene.input.setDraggable(container);
                container.on('pointerdown', () => { container.hasMoved = false; container.depth = 10; });
                container.on('pointerup', () => {
                    container.depth = 1;
                    if (!container.hasMoved) {
                        let ed = container.getData('edges');
                        ed.unshift(ed.pop());
                        container.setData('edges', ed);
                        refresh(scene);
                    }
                });
            }
            return container;
        }

        function refresh(scene) {
            const placed = pieces.filter(p => p.q !== null);
            let errors = 0;

            placed.forEach(p1 => {
                let hasErr = false;
                let connections = 0;
                DIRS.forEach((dir, i) => {
                    const p2 = placed.find(p => p.q === p1.q + dir.q && p.r === p1.r + dir.r);
                    if (p2) {
                        connections++;
                        if (p1.getData('edges')[i] !== p2.getData('edges')[(i+3)%6]) { hasErr = true; errors++; }
                    }
                });
                drawPiece(p1, (connections > 0) ? (hasErr ? "error" : "success") : "normal");
            });

            pieces.filter(p => p.q === null).forEach(p => drawPiece(p, "normal"));
            
            const allPlaced = pieces.every(p => p.q !== null);
            document.getElementById('msg').style.opacity = (allPlaced && errors === 0) ? 1 : 0;
        }

        function drawPiece(c, status) {
            const g = c.list[0];
            const edges = c.getData('edges');
            let mainCol = (status === "error") ? 0xff0000 : (status === "success") ? 0x00ff00 : (c.isFixed ? 0xffffff : 0x00f2ff);
            
            g.clear();
            g.lineStyle(c.isFixed ? 3 : 1.5, mainCol, 1);
            g.fillStyle(c.isFixed ? 0x1a1a2e : 0x0b0b15, 1);
            const pts = getHexPts(HEX_SIZE);
            g.beginPath(); g.moveTo(pts[0].x, pts[0].y);
            pts.forEach(p => g.lineTo(p.x, p.y));
            g.closePath(); g.fillPath(); g.strokePath();

            edges.forEach((type, i) => {
                const angle = (Math.PI / 3 * i); 
                const d = HEX_SIZE * 0.78;
                g.fillStyle(COLORS[type], 1);
                g.fillCircle(Math.cos(angle)*d, Math.sin(angle)*d, 5);
                g.lineStyle(1, 0xffffff, 0.4);
                g.strokeCircle(Math.cos(angle)*d, Math.sin(angle)*d, 5);
            });
        }

        function getHexPts(s) {
            let p = [];
            for (let i = 0; i < 6; i++) {
                let a = (Math.PI / 3 * i);
                p.push({ x: s * Math.cos(a + Math.PI/6), y: s * Math.sin(a + Math.PI/6) });
            }
            return p;
        }
    </script>
</body>
</html>
